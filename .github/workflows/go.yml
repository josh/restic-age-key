name: Go

on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: "test (age ${{ matrix.age_version }}, restic ${{ matrix.restic_version }})"
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          # nixos-25.11
          - age_version: "1.3.1"
            restic_version: "0.18.1"
            go_version: "1.25.9"

          # nixos-26.05
          - age_version: "1.3.1"
            restic_version: "0.18.1"
            go_version: "1.26.3"

          # nixpkgs-unstable
          - age_version: "1.3.1"
            restic_version: "0.19.0"
            go_version: "1.26.3"

    env:
      AGE_VERSION: "${{ matrix.age_version }}"
      RESTIC_VERSION: "${{ matrix.restic_version }}"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install age
        run: |
          set -o xtrace
          curl --location https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz --output age.tar.gz
          tar -xzf age.tar.gz
          chmod +x age/age
          sudo mv age/age /usr/local/bin/age

      - name: Install restic
        run: |
          set -o xtrace
          curl --location https://github.com/restic/restic/releases/download/v${RESTIC_VERSION}/restic_${RESTIC_VERSION}_linux_amd64.bz2 --output restic_${RESTIC_VERSION}_linux_amd64.bz2
          bunzip2 restic_${RESTIC_VERSION}_linux_amd64.bz2
          chmod +x restic_${RESTIC_VERSION}_linux_amd64
          sudo mv restic_${RESTIC_VERSION}_linux_amd64 /usr/local/bin/restic

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ matrix.go_version }}"

      - name: Build
        run: |
          go build

      - name: Test
        run: |
          go test
